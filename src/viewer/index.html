<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot-in-a-Box — 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; color: #e0e0e0; z-index: 100;
    }
    #loading.hidden { display: none; }
    #loading h1 { font-size: 1.5rem; margin-bottom: 1rem; font-weight: 400; }
    #progress-bar {
      width: 300px; height: 4px; background: #333;
      border-radius: 2px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%; background: #4a9eff;
      transition: width 0.3s ease;
    }
    #progress-text { margin-top: 0.5rem; font-size: 0.85rem; color: #888; }

    #controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      background: rgba(20, 20, 40, 0.9); padding: 12px 20px;
      border-radius: 12px; backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 10;
    }
    #controls.hidden { display: none; }

    .ctrl-btn {
      background: rgba(74, 158, 255, 0.15); border: 1px solid rgba(74, 158, 255, 0.3);
      color: #4a9eff; padding: 8px 16px; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
    }
    .ctrl-btn:hover { background: rgba(74, 158, 255, 0.3); }
    .ctrl-btn.active { background: rgba(74, 158, 255, 0.4); border-color: #4a9eff; }

    #scrubber {
      width: 200px; accent-color: #4a9eff;
    }
    #time-label { color: #888; font-size: 0.8rem; min-width: 40px; }

    #info {
      position: fixed; top: 20px; left: 20px;
      color: #888; font-size: 0.8rem; z-index: 10;
    }
    #part-label {
      position: fixed; top: 20px; right: 20px;
      color: #4a9eff; font-size: 0.9rem; z-index: 10;
      background: rgba(20, 20, 40, 0.8); padding: 6px 12px;
      border-radius: 6px; display: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>Loading Robot-in-a-Box...</h1>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-text">Initializing...</div>
  </div>

  <div id="controls" class="hidden">
    <button class="ctrl-btn" id="btn-play" title="Play/Pause">&#9654; Play</button>
    <button class="ctrl-btn" id="btn-reset" title="Reset to folded">&#8635; Reset</button>
    <input type="range" id="scrubber" min="0" max="1000" value="0" step="1">
    <span id="time-label">0.0s</span>
    <button class="ctrl-btn" id="btn-speed" title="Change speed">1x</button>
  </div>

  <div id="info">
    Robot-in-a-Box &mdash; Scroll to zoom, drag to rotate, right-drag to pan
  </div>
  <div id="part-label"></div>
  <div id="step-label" style="
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    color: #e0e0e0; font-size: 1.1rem; z-index: 10;
    background: rgba(20, 20, 40, 0.8); padding: 8px 16px;
    border-radius: 8px; display: none; text-align: center;
  "></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="viewer.js"></script>
</body>
</html>
